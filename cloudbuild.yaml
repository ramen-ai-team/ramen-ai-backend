steps:
  - id: Cancel Previous Builds
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        # 同じトリガーからの実行中のビルドを取得（自分以外）
        RUNNING_BUILDS=$$(gcloud builds list \
          --ongoing \
          --filter="buildTriggerId=$_TRIGGER_ID AND id!=$BUILD_ID" \
          --format="value(id)" \
          --project=$_AR_PROJECT_ID)

        if [ -n "$$RUNNING_BUILDS" ]; then
          for BUILD in $$RUNNING_BUILDS; do
            # キャンセル対象ビルドのコミットSHAを取得
            BUILD_COMMIT=$$(gcloud builds describe $$BUILD \
              --format="value(substitutions.COMMIT_SHA)" \
              --project=$_AR_PROJECT_ID 2>/dev/null)

            # そのコミットにマイグレーション変更があるか確認
            HAS_MIGRATION=""
            if [ -n "$$BUILD_COMMIT" ]; then
              HAS_MIGRATION=$$(git diff --name-only $${BUILD_COMMIT}~1 $${BUILD_COMMIT} -- db/migrate/ 2>/dev/null | head -1)
            fi

            # マイグレーションありの場合、Apply Migrationsステップ完了まで待機してからキャンセル
            if [ -n "$$HAS_MIGRATION" ]; then
              echo "Build $$BUILD has migration changes, waiting for Apply Migrations step..."
              while true; do
                STEP_STATUS=$$(gcloud builds describe $$BUILD \
                  --format="value(steps[2].status)" \
                  --project=$_AR_PROJECT_ID 2>/dev/null)
                if [ "$$STEP_STATUS" = "SUCCESS" ] || [ "$$STEP_STATUS" = "FAILURE" ] || [ -z "$$STEP_STATUS" ]; then
                  break
                fi
                sleep 10
              done
            fi

            echo "Cancelling build $$BUILD"
            gcloud builds cancel "$$BUILD" --project=$_AR_PROJECT_ID || true
          done
        else
          echo "No previous builds to cancel"
        fi

  - id: Build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker buildx create --use --name builder --driver docker-container
        docker buildx build \
          --cache-from "type=registry,ref=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:buildcache" \
          --cache-to "type=registry,ref=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:buildcache,mode=max" \
          -t "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA" \
          -t "$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:latest" \
          --push \
          -f Dockerfile \
          .
    env:
      - "DOCKER_BUILDKIT=1"

  - id: Apply Migrations
    name: gcr.io/google-appengine/exec-wrapper
    entrypoint: "bash"
    secretEnv: ["RAILS_MASTER_KEY"]
    args:
      - -c
      - |
        PREV_REVISION=$$(gcloud run services describe $_SERVICE_NAME \
          --region=$_DEPLOY_REGION \
          --platform=managed \
          --format="value(status.latestReadyRevisionName)" \
          --project=$_AR_PROJECT_ID 2>/dev/null)
        PREV_SHA=$$(gcloud run revisions describe $$PREV_REVISION \
          --region=$_DEPLOY_REGION \
          --platform=managed \
          --format="value(metadata.labels['commit-sha'])" \
          --project=$_AR_PROJECT_ID 2>/dev/null)
        if [ -z "$$PREV_SHA" ]; then
          echo "No previous deployment found, running db:migrate"
          RUN_MIGRATE=true
        elif git diff --name-only $$PREV_SHA HEAD -- db/migrate/ | grep -q .; then
          echo "Migration files changed since last deploy ($$PREV_SHA), running db:migrate"
          RUN_MIGRATE=true
        else
          echo "No migration files changed since last deploy, skipping db:migrate"
          RUN_MIGRATE=false
        fi
        if [ "$$RUN_MIGRATE" = "true" ]; then
          /buildstep/execute.sh \
            -i $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA \
            -e RAILS_ENV=production \
            -e RAILS_MASTER_KEY=$$RAILS_MASTER_KEY \
            -- bundle exec rails db:migrate
        fi

  - id: Import Data
    name: gcr.io/google-appengine/exec-wrapper
    entrypoint: "bash"
    secretEnv: ["RAILS_MASTER_KEY"]
    args:
      - -c
      - |
        /buildstep/execute.sh \
          -i $_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA \
          -e RAILS_ENV=production \
          -e RAILS_MASTER_KEY=$$RAILS_MASTER_KEY \
          -- bundle exec rake data:import

  - id: Deploy
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - "--platform=managed"
      - >-
        --image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA
      - >-
        --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - "--region=$_DEPLOY_REGION"
      - "--remove-env-vars=GOOGLE_PRIVATE_KEY,GOOGLE_PRIVATE_KEY_ID,GOOGLE_APPLICATION_CREDENTIALS"
      - "--set-secrets=RAILS_MASTER_KEY=RAILS_MASTER_KEY:latest,GCP_CLIENT_ID=GCP_CLIENT_ID:latest,GCP_CLIENT_SECRET=GCP_CLIENT_SECRET:latest"
      - "--quiet"
    entrypoint: gcloud

  - id: Update Traffic
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    args:
      - run
      - services
      - update-traffic
      - $_SERVICE_NAME
      - "--to-latest"
      - "--region=$_DEPLOY_REGION"
      - "--quiet"
    entrypoint: gcloud

options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _DEPLOY_REGION: asia-northeast1
  _AR_HOSTNAME: asia-northeast1-docker.pkg.dev
  _AR_REPOSITORY: cloud-run-source-deploy
  _AR_PROJECT_ID: ramen-ai
  _SERVICE_NAME: ramen-ai-backend-service
availableSecrets:
  secretManager:
    - versionName: projects/943228427206/secrets/RAILS_MASTER_KEY/versions/2
      env: "RAILS_MASTER_KEY"
tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - ramen-ai-backend-service

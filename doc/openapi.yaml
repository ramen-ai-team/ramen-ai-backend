  "/api/v1/recommended_menus":
    post:
      summary: create
      tags:
      - Api::V1::RecommendedMenu
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                select_menu_ids:
                  type: array
                  items:
                    type: string
                not_select_menu_ids:
                  type: array
                  items:
                    type: string
              required:
              - select_menu_ids
            example:
              select_menu_ids:
              - '1'
              - '2'
              not_select_menu_ids:
              - '3'
              - '4'
      responses:
        '200':
          description: returns a recommended menu based on select_menu_ids & not_select_menu_ids
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommended_menu:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      genre_name:
                        type: string
                      noodle_name:
                        type: string
                      soup_name:
                        type: string
                      image_url:
                        type: string
                      shop:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          address:
                            type: string
                          google_map_url:
                            type: string
                          latitude:
                            type: number
                            format: float
                          longitude:
                            type: number
                            format: float
                        required:
                        - id
                        - name
                        - address
                        - google_map_url
                    required:
                    - id
                    - name
                    - genre_name
                    - noodle_name
                    - soup_name
                    - image_url
                    - shop
                  reason:
                    type: string
                required:
                - recommended_menu
                - reason
              example:
                recommended_menu:
                  id: 1272
                  name: Ramen 32
                  genre_name: ラーメン
                  noodle_name: 太麺
                  soup_name: 豚骨
                  image_url: http://example.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTI0NywicHVyIjoiYmxvYl9pZCJ9fQ==--a927badb7960b3dd20404770ceaefc5a425b49ee/ramen.png
                  shop:
                    id: 1685
                    name: ラーメン屋
                    address: 東京都新宿区
                    google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9
                    latitude: 35.6812
                    longitude: 139.7671
                reason: 魚介つけ麺や二郎系ラーメンなど、濃厚でインパクトのある味をお好みのようですので、同じく濃厚な「豚骨」スープのラーメンをおすすめします。特に食べ応えのある太麺との相性は抜群で、鶏ガラとはまた違ったクリーミーで深みのある味わいをお楽しみいただけます。
        '400':

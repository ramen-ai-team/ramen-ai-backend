---
openapi: 3.0.3
info:
  title: ramen-ai-backend
  version: 1.0.0
servers: []
paths:
  "/api/v1/admin/users":
    get:
      summary: index
      tags:
      - Api::V1::Admin::User
      responses:
        '200':
          description: returns empty array when no users exist
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    email:
                      type: string
                    name:
                      type: string
                    provider:
                      type: string
                    uid:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
                    google_id:
                      nullable: true
                    image:
                      type: string
                    email_verified:
                      type: boolean
                  required:
                  - id
                  - email
                  - name
                  - provider
                  - uid
                  - created_at
                  - updated_at
                  - google_id
                  - image
                  - email_verified
              example: []
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
  "/api/v1/auth/google":
    post:
      summary: google
      tags:
      - Api::V1::Auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                code:
                  type: string
                redirect_uri:
                  type: string
              required:
              - code
              - redirect_uri
            example:
              code: valid_auth_code
              redirect_uri: https://ramen-ni-ai-wo.vercel.app/auth/callback
      responses:
        '200':
          description: returns existing user & updates if already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                      name:
                        type: string
                      image:
                        type: string
                    required:
                    - id
                    - email
                    - name
                    - image
                required:
                - token
                - user
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjozODksImV4cCI6MTc3MzU1NjEzOCwiaWF0IjoxNzcyOTUxMzM4fQ.A-11gEh6f1l1LxPlrTtX6cXIqfop4mZ1jiNcsgl8h7U
                user:
                  id: 389
                  email: user@example.com
                  name: John Doe
                  image: https://lh3.googleusercontent.com/a/default-user
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error
                - message
              example:
                error: invalid_token
                message: Invalid or expired Google token
        '500':
          description: returns internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error
                - message
              example:
                error: authentication_failed
                message: Authentication process failed
  "/api/v1/current_user":
    get:
      summary: current
      tags:
      - Api::V1::User
      responses:
        '200':
          description: ユーザー情報を返す
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  image:
                    type: string
                required:
                - id
                - name
                - email
                - image
              example:
                id: 393
                name: User 5
                email: user4@example.com
                image: https://example.com/user_image.png
        '401':
          description: 401を返す
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error
                - message
              example:
                error: invalid_token
                message: Invalid token
  "/api/v1/menu_with_shops/{id}":
    get:
      summary: show
      tags:
      - Api::V1::MenuWithShop
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 185
      responses:
        '200':
          description: returns a specific menu
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  genre_name:
                    type: string
                  noodle_name:
                    type: string
                  soup_name:
                    type: string
                  image_url:
                    type: string
                  shop:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      address:
                        type: string
                      google_map_url:
                        type: string
                    required:
                    - id
                    - name
                    - address
                    - google_map_url
                required:
                - id
                - name
                - genre_name
                - noodle_name
                - soup_name
                - image_url
                - shop
              example:
                id: 185
                name: 特製ラーメン
                genre_name: ラーメン
                noodle_name: 太麺
                soup_name: 豚骨
                image_url: http://example.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTg1LCJwdXIiOiJibG9iX2lkIn19--f3f8bd8750d7884b991799356fbae3b9ed18ddfa/ramen.png
                shop:
                  id: 330
                  name: ラーメン屋
                  address: 東京都新宿区
                  google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9
  "/api/v1/random_menus":
    get:
      summary: index
      tags:
      - Api::V1::RandomMenu
      responses:
        '200':
          description: returns all menus
          content:
            application/json:
              schema:
                type: object
                properties:
                  menus:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        genre_name:
                          type: string
                        noodle_name:
                          type: string
                        soup_name:
                          type: string
                        image_url:
                          type: string
                      required:
                      - id
                      - name
                      - genre_name
                      - noodle_name
                      - soup_name
                      - image_url
                required:
                - menus
              example:
                menus:
                - id: 186
                  name: 博多ラーメン
                  genre_name: ラーメン
                  noodle_name: 細麺
                  soup_name: 豚骨スープ
                  image_url: http://example.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTg2LCJwdXIiOiJibG9iX2lkIn19--6d46e7d9006b5cd849757804bad02b65ace8dc3e/ramen.png
  "/api/v1/recommended_menus":
    post:
      summary: create
      tags:
      - Api::V1::RecommendedMenu
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                select_menu_ids:
                  type: array
                  items:
                    type: string
                not_select_menu_ids:
                  type: array
                  items:
                    type: string
              required:
              - select_menu_ids
            example:
              select_menu_ids:
              - '1'
              - '2'
              not_select_menu_ids:
              - '3'
              - '4'
      responses:
        '200':
          description: returns a recommended menu based on select_menu_ids & not_select_menu_ids
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommended_menu:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      genre_name:
                        type: string
                      noodle_name:
                        type: string
                      soup_name:
                        type: string
                      image_url:
                        type: string
                      shop:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          address:
                            type: string
                          google_map_url:
                            type: string
                        required:
                        - id
                        - name
                        - address
                        - google_map_url
                    required:
                    - id
                    - name
                    - genre_name
                    - noodle_name
                    - soup_name
                    - image_url
                    - shop
                  reason:
                    type: string
                required:
                - recommended_menu
                - reason
              example:
                recommended_menu:
                  id: 188
                  name: Ramen 8
                  genre_name: ラーメン
                  noodle_name: 太麺
                  soup_name: 豚骨
                  image_url: http://example.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MTg4LCJwdXIiOiJibG9iX2lkIn19--5ab4eb5277763af664d47fc7a41493d79e69cd20/ramen.png
                  shop:
                    id: 333
                    name: ラーメン屋
                    address: 東京都新宿区
                    google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9
                reason: 魚介つけ麺や二郎系ラーメンなど、濃厚でインパクトのある味をお好みのようですので、同じく濃厚な「豚骨」スープのラーメンをおすすめします。特に食べ応えのある太麺との相性は抜群で、鶏ガラとはまた違ったクリーミーで深みのある味わいをお楽しみいただけます。
        '400':
          description: returns an error if select_menu_ids is missing
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: select_menu_idsが必要です
  "/api/v1/shops":
    get:
      summary: index
      tags:
      - Api::V1::Shop
      responses:
        '200':
          description: returns all shops
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        address:
                          type: string
                        google_map_url:
                          type: string
                      required:
                      - id
                      - name
                      - address
                      - google_map_url
                required:
                - shops
              example:
                shops:
                - id: 335
                  name: 九州 筑豊ラーメン山小屋
                  address: 佐賀県嬉野市嬉野町大字下宿甲４００２−４
                  google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9
    post:
      summary: create
      tags:
      - Api::V1::Shop
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                google_map_url:
                  type: string
              required:
              - google_map_url
            example:
              google_map_url: https://maps.app.goo.gl/dGfTAMwDfw29yLPc7
      responses:
        '201':
          description: creates a new shop from Google Maps data
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  address:
                    type: string
                  google_map_url:
                    type: string
                required:
                - id
                - name
                - address
                - google_map_url
              example:
                id: 337
                name: ラーメン太郎
                address: 東京都渋谷区道玄坂1-2-3
                google_map_url: https://maps.app.goo.gl/dGfTAMwDfw29yLPc7
        '400':
          description: returns bad request error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - Google map url は「https://maps.app.goo.gl/」から始まるGoogle Map URLにしてください
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Authorization header missing
        '503':
          description: returns service unavailable error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - Google map url から店舗情報を取得できませんでした
  "/api/v1/shops/{id}":
    get:
      summary: show
      tags:
      - Api::V1::Shop
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        example: 336
      responses:
        '200':
          description: returns a specific shop
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  address:
                    type: string
                  google_map_url:
                    type: string
                required:
                - id
                - name
                - address
                - google_map_url
              example:
                id: 336
                name: 九州 筑豊ラーメン山小屋
                address: 佐賀県嬉野市嬉野町大字下宿甲４００２−４
                google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9

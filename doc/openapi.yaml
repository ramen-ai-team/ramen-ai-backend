                        - id
                        - name
                  required:
                  - id
                  - name
                  - address
                  - google_map_url
                  - created_at
                  - updated_at
                  - menus
              example: []
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized

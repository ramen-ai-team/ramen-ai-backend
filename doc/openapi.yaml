  "/api/v1/menu_reports":
    post:
      summary: create
      description: |
        menu_id または menu のどちらか一方を指定してください。
        - menu_id: 既存メニューに紐づける場合
        - menu: メニューを新規作成する場合（shop_id と name が必須）
        両方指定した場合はエラーになります。
      tags:
      - Api::V1::MenuReport
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                menu_id:
                  type: string
                  description: 既存メニューのID。menu と同時に指定不可
                genre_id:
                  type: string
                noodle_id:
                  type: string
                soup_id:
                  type: string
                menu:
                  type: object
                  description: メニューを新規作成する場合に指定。menu_id と同時に指定不可
                  properties:
                    shop_id:
                      type: string
                    name:
                      type: string
                  required:
                  - shop_id
                  - name
              required:
              - genre_id
              - noodle_id
              - soup_id
            example:
              menu_id: '381'
              genre_id: '228'
              noodle_id: '228'
              soup_id: '192'
              menu:
                shop_id: '517'
                name: 特製醤油ラーメン
      responses:
        '201':
          description: menuとmenu_reportを同時に作成できる
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  menu:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      genre_name:
                        type: string
                      noodle_name:
                        type: string
                      soup_name:
                        type: string
                      image_url:
                        type: string
                        nullable: true
                    required:
                    - id
                    - name
                    - genre_name
                    - noodle_name
                    - soup_name
                    - image_url
                  genre_name:
                    type: string
                  noodle_name:
                    type: string
                  soup_name:
                    type: string
                required:
                - id
              example:
                id: 44
                menu:
                  id: 383
                  name: 特製醤油ラーメン
                  genre_name: Genre 13
                  noodle_name: Noodle 14
                  soup_name: Soup 10
                  image_url:
                genre_name: Genre 13
                noodle_name: Noodle 14
                soup_name: Soup 10
        '401':
          description: 401を返す
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Authorization header missing
        '422':
          description: 422を返す
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - menu_id と menu は同時に指定できません

                      - id
                      - name
                      - created_at
                      - updated_at
                    soup:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                      required:
                      - id
                      - name
                      - created_at
                      - updated_at
                    noodle:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                      required:
                      - id
                      - name
                      - created_at
                      - updated_at
                  required:
                  - id
                  - name
                  - shop_id
                  - created_at
                  - updated_at
                  - image_url
                  - shop
                  - genre
                  - soup
                  - noodle
              example: []
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
    post:
      summary: create
      tags:
      - Api::V1::Admin::Menu
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                menu:
                  type: object
                  properties:
                    name:
                      type: string
                    shop_id:
                      type: string
                    genre_id:
                      type: string
                    soup_id:
                      type: string
                    noodle_id:
                      type: string
                    image:
                      type: string
                      format: binary
                  required:
                  - name
                  - shop_id
                  - image
              required:
              - menu
            example:
              menu:
                name: Simple Ramen
                shop_id: '377'
                genre_id: '357'
                soup_id: '291'
                noodle_id: '415'
                image: ramen.png
      responses:
        '201':
          description: creates a menu without optional associations
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  shop_id:
                    type: integer
                  created_at:
                    type: string
                  updated_at:
                    type: string
                  image_url:
                    type: string
                  shop:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      address:
                        type: string
                      google_map_url:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                    required:
                    - id
                    - name
                    - address
                    - google_map_url
                    - created_at
                    - updated_at
                  genre:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                    required:
                    - id
                    - name
                    - created_at
                    - updated_at
                  soup:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                    required:
                    - id
                    - name
                    - created_at
                    - updated_at
                  noodle:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      created_at:
                        type: string
                      updated_at:
                        type: string
                    required:
                    - id
                    - name
                    - created_at
                    - updated_at
                required:
                - id
                - name
                - shop_id
                - created_at
                - updated_at
                - image_url
                - shop
              example:
                id: 283
                name: Simple Ramen
                shop_id: 377
                created_at: '2026-03-08T15:49:52.194+09:00'
                updated_at: '2026-03-08T15:49:52.207+09:00'
                image_url: http://example.com/rails/active_storage/blobs/redirect/eyJfcmFpbHMiOnsiZGF0YSI6MjgzLCJwdXIiOiJibG9iX2lkIn19--a979a61ba1f15621c122c903826c3b4b864e884b/ramen.png
                shop:

---
openapi: 3.0.3
info:
  title: ramen-ai-backend
  version: 1.0.0
servers: []
paths:
  "/api/v1/admin/auth":
    delete:
      summary: destroy
      tags:
      - Api::V1::Admin::Authentication
      responses:
        '200':
          description: returns logout success message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
              example:
                message: Logged out successfully
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
    post:
      summary: create
      tags:
      - Api::V1::Admin::Authentication
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
            example:
              email: admin@example.com
              password: password123
      responses:
        '200':
          description: returns a token and admin user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                    required:
                    - id
                    - email
                required:
                - token
                - admin_user
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJhZG1pbl91c2VyX2lkIjoyODEsImV4cCI6MTc3NDE0NjE5OX0.1_H-TkLiMlhec43mZRJ2PbPd1HtuaCqke4sqdEybmoM
                admin_user:
                  id: 281
                  email: admin@example.com
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Invalid credentials

  "/api/v1/recommended_menus":
    post:
      summary: create
      tags:
      - Api::V1::RecommendedMenu
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                select_menu_ids:
                  type: array
                  items:
                    type: string
                not_select_menu_ids:

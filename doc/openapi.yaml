---
openapi: 3.0.3
info:
  title: ramen-ai-backend
  version: 1.0.0
servers: []
paths:
  "/api/v1/admin/auth":
    delete:
      summary: destroy
      tags:
      - Api::V1::Admin::Authentication
      responses:
        '200':
          description: returns logout success message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
              example:
                message: Logged out successfully
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
    post:
      summary: create
      tags:
      - Api::V1::Admin::Authentication
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
            example:
              email: admin@example.com
              password: password123
      responses:
        '200':
          description: returns a token and admin user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                    required:
                    - id
                    - email
                required:
                - token
                - admin_user
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJhZG1pbl91c2VyX2lkIjoxMDE2LCJleHAiOjE3NzY1NjUwNDN9.5b6fjktSXyNeogO6JkzQcqpPIXejoAu7IANfPxM6aC4
                admin_user:
                  id: 1016
                  email: admin@example.com
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Invalid credentials
  "/api/v1/admin/genres":
    get:
      summary: index
      tags:
      - Api::V1::Admin::Genre
      responses:
        '200':
          description: returns empty array when no genres exist
          headers:
            Current-Page:
              "$ref": "#/components/headers/CurrentPage"
            Page-Items:
              "$ref": "#/components/headers/PageItems"
            Total-Pages:
              "$ref": "#/components/headers/TotalPages"
            Total-Count:
              "$ref": "#/components/headers/TotalCount"
            Link:
              "$ref": "#/components/headers/Link"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
                  required:
                  - id
                  - name
                  - created_at
                  - updated_at
              example: []
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
  "/api/v1/admin/menu_reports":
    get:
      summary: index
      tags:
      - Api::V1::Admin::MenuReport
      responses:
        '200':
          description: returns empty array when no menu_reports exist
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    created_at:
                      type: string
                    image_urls:
                      type: array
                      items: {}
                    user:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        email:
                          type: string
                      required:
                      - id
                      - name
                      - email
                    menu:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        shop:
                          type: object
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                          required:
                          - id
                          - name
                        reviews:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              rating:
                                type: integer
                              comment:
                                type: string
                              visited_at:
                                type: string
                            required:
                            - id
                            - rating
                            - comment
                            - visited_at
                      required:
                      - id
                      - name
                      - shop
                      - reviews
                    genre:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                      - id
                      - name
                    noodle:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                      - id
                      - name
                    soup:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                      required:
                      - id
                      - name
                  required:
                  - id
                  - created_at
                  - image_urls
                  - user
                  - menu
                  - genre
                  - noodle
                  - soup
              example: []
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized

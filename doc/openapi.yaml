---
openapi: 3.0.3
info:
  title: ramen-ai-backend
  version: 1.0.0
servers: []
paths:
  "/api/v1/admin/auth":
    delete:
      summary: destroy
      tags:
      - Api::V1::Admin::Authentication
      responses:
        '200':
          description: returns logout success message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
              example:
                message: Logged out successfully
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
    post:
      summary: create
      tags:
      - Api::V1::Admin::Authentication
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
              - email
              - password
            example:
              email: admin@example.com
              password: password123
      responses:
        '200':
          description: returns a token and admin user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  admin_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
                    required:
                    - id
                    - email
                required:
                - token
                - admin_user
              example:
                token: eyJhbGciOiJIUzI1NiJ9.eyJhZG1pbl91c2VyX2lkIjo2MzEsImV4cCI6MTc3NDgzNTg1NH0.GRDfEupm8Po3_YWIq1sN-0bYTdM8yZQpkIjDeTq3a4Y
                admin_user:
                  id: 631
                  email: admin@example.com
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Invalid credentials
  "/api/v1/admin/genres":

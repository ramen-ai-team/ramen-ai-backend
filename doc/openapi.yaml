  "/api/v1/shops":
    get:
      summary: index
      tags:
      - Api::V1::Shop
      responses:
        '200':
          description: returns all shops
          content:
            application/json:
              schema:
                type: object
                properties:
                  shops:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        address:
                          type: string
                        google_map_url:
                          type: string
                      required:
                      - id
                      - name
                      - address
                      - google_map_url
                required:
                - shops
              example:
                shops:
                - id: 538
                  name: 九州 筑豊ラーメン山小屋
                  address: 佐賀県嬉野市嬉野町大字下宿甲４００２−４
                  google_map_url: https://maps.app.goo.gl/BvuQTxGsmKLJ68yL9
    post:
      summary: create
      tags:
      - Api::V1::Shop
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                google_map_url:
                  type: string
              required:
              - google_map_url
            example:
              google_map_url: https://maps.app.goo.gl/dGfTAMwDfw29yLPc7
      responses:
        '201':
          description: creates a new shop from Google Maps data
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  address:
                    type: string
                  google_map_url:
                    type: string
                required:
                - id
                - name
                - address
                - google_map_url
              example:
                id: 540
                name: ラーメン太郎
                address: 東京都渋谷区道玄坂1-2-3
                google_map_url: https://maps.app.goo.gl/dGfTAMwDfw29yLPc7
        '400':
          description: returns bad request error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - Google map url は「https://maps.app.goo.gl/」から始まるGoogle Map URLにしてください
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Authorization header missing
        '503':
          description: returns service unavailable error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - Google map url から店舗情報を取得できませんでした

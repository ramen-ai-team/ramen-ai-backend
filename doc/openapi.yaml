                      - id
                      - name
                      - address
                      - google_map_url
                      - created_at
                      - updated_at
                    genre:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string

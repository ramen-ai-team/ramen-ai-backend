                  name: Shop 22
                  address: '東京都新宿区 #<#<Class:0x0000ffff78cf9e28>:0x0000ffff78d524b0>'
                  google_map_url: https://maps.app.goo.gl/#<#<Class:0x0000ffff78cf9e28>:0x0000ffff78d524b0>

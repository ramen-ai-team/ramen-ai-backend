                  created_at: '2026-03-08T15:49:51.991+09:00'
                  updated_at: '2026-03-08T15:49:51.991+09:00'
        '401':
          description: returns unauthorized error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
              example:
                error: Unauthorized
        '422':
          description: returns unprocessable entity with invalid params
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
              example:
                errors:
                - Shop must exist
                - Name can't be blank
                - Image can't be blank

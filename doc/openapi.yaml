              "$ref": "#/components/headers/CurrentPage"
            Page-Items:
              "$ref": "#/components/headers/PageItems"
            Total-Pages:
              "$ref": "#/components/headers/TotalPages"
            Total-Count:
              "$ref": "#/components/headers/TotalCount"
            Link:
              "$ref": "#/components/headers/Link"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    created_at:
                      type: string
                    updated_at:
                      type: string
                  required:
                  - id
                  - name
                  - created_at
                  - updated_at
              example: []
        '401':
          description: returns unauthorized error
